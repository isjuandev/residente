name: Mobile CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-ci.yml"

jobs:
  android:
    name: Android build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure native project files
        run: flutter create --platforms=android --org com.residente .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug --dart-define=API_URL=https://api.residente.app

  ios:
    name: iOS build
    runs-on: macos-14
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure native project files
        run: flutter create --platforms=ios --org com.residente .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build iOS without signing
        run: flutter build ios --debug --no-codesign --dart-define=API_URL=https://api.residente.app
