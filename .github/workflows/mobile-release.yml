name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Release platform
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
      build_name:
        description: Semantic version, for example 1.0.0
        required: true
        default: 0.1.0
      build_number:
        description: Monotonic store build number
        required: true
        default: "1"

jobs:
  android:
    name: Android Play Store
    if: inputs.platform == 'android'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure native project files
        run: flutter create --platforms=android --org com.residente .

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: apps/mobile
          bundler-cache: true

      - name: Restore Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          mkdir -p android/keystores
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystores/residente-release.jks
          echo "$ANDROID_KEY_PROPERTIES" > android/key.properties

      - name: Restore Google Play service account
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_CONTENT" > google-play-service-account.json

      - name: Build and upload internal release
        env:
          BUILD_NAME: ${{ inputs.build_name }}
          BUILD_NUMBER: ${{ inputs.build_number }}
          MOBILE_API_URL: ${{ secrets.MOBILE_API_URL }}
          MOBILE_SENTRY_DSN: ${{ secrets.MOBILE_SENTRY_DSN }}
          MOBILE_SENTRY_ENVIRONMENT: production
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: google-play-service-account.json
        run: bundle exec fastlane android internal

  ios:
    name: iOS TestFlight
    if: inputs.platform == 'ios'
    runs-on: macos-14
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure native project files
        run: flutter create --platforms=ios --org com.residente .

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: apps/mobile
          bundler-cache: true

      - name: Restore Apple signing assets
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          security create-keychain -p "$RUNNER_TEMP" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$RUNNER_TEMP" build.keychain
          echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/residente.mobileprovision"

      - name: Build and upload TestFlight release
        env:
          BUILD_NAME: ${{ inputs.build_name }}
          BUILD_NUMBER: ${{ inputs.build_number }}
          MOBILE_API_URL: ${{ secrets.MOBILE_API_URL }}
          MOBILE_SENTRY_DSN: ${{ secrets.MOBILE_SENTRY_DSN }}
          MOBILE_SENTRY_ENVIRONMENT: production
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: bundle exec fastlane ios testflight
